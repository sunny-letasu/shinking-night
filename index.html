<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いのちのロウソク ─ 死ンキングナイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --night-deep: #1a1f3a;
    --night-mid: #252b4a;
    --candle-yellow: #ffd84d;
    --candle-orange: #ff9a3c;
    --candle-deep: #ff7029;
    --flame-core: #fff5d1;
    --pop-pink: #ff8fa3;
    --pop-mint: #8de4d0;
    --pop-cream: #fff4d6;
    --text-primary: #fff4d6;
    --text-soft: #e0d4a8;
    --text-muted: #9a8a6b;
    --text-dim: #5a5070;
    --danger: #ff5e6c;
    --ghost-blue: #a8c5e8;
    --ghost-mist: #d4e4f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Zen Maru Gothic', 'M PLUS Rounded 1c', sans-serif;
    background: radial-gradient(ellipse at center 40%, var(--night-mid) 0%, var(--night-deep) 80%);
    color: var(--text-primary);
    min-height: 100vh; overflow: hidden;
    user-select: none; -webkit-tap-highlight-color: transparent;
    font-weight: 500;
  }
  body.ghost-mode { background: radial-gradient(ellipse at center 40%, #2a3855 0%, #1a2238 80%); }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .star { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; opacity: 0.7; animation: twinkle 3s ease-in-out infinite; }
  .star.big { width: 8px; height: 8px; background: var(--candle-yellow); }
  .star.sparkle { background: transparent; color: var(--candle-yellow); width: auto; height: auto; }
  .star.sparkle::before, .star.sparkle::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: currentColor; }
  .star.sparkle::before { width: 14px; height: 1.5px; }
  .star.sparkle::after { width: 1.5px; height: 14px; }
  @keyframes twinkle { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; z-index: 5; opacity: 1; transition: opacity 0.5s ease; }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .entry-mark { font-size: 0.75rem; letter-spacing: 0.4em; color: var(--pop-mint); margin-bottom: 1.5rem; padding-left: 0.4em; font-weight: 700; }
  .entry-title { font-size: 3rem; font-weight: 900; letter-spacing: 0.05em; color: var(--candle-yellow); text-shadow: 0 4px 0 var(--candle-deep), 0 0 40px rgba(255, 216, 77, 0.4); margin-bottom: 0.8rem; }
  .entry-title .heart-dot { color: var(--pop-pink); }
  .entry-tagline { font-size: 1rem; letter-spacing: 0.1em; color: var(--pop-cream); opacity: 0.85; margin-bottom: 3rem; font-weight: 500; }
  .entry-name { background: rgba(255, 244, 214, 0.08); border: 2px solid var(--text-dim); border-radius: 20px; color: var(--text-primary); font-family: inherit; font-size: 1.1rem; font-weight: 500; padding: 0.9rem 1.2rem; width: min(280px, 80vw); text-align: center; outline: none; margin-bottom: 2rem; transition: all 0.3s; }
  .entry-name:focus { border-color: var(--candle-yellow); background: rgba(255, 216, 77, 0.08); }
  .entry-name::placeholder { color: var(--text-dim); }
  .entry-start { background: var(--candle-yellow); border: none; color: #4a3818; padding: 1rem 2.8rem; font-family: inherit; font-size: 1.05rem; font-weight: 900; letter-spacing: 0.15em; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 0 var(--candle-deep), 0 8px 20px rgba(255, 154, 60, 0.3); transition: all 0.15s ease; }
  .entry-start:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 0 var(--candle-deep), 0 12px 25px rgba(255, 154, 60, 0.4); }
  .entry-start:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 var(--candle-deep); }
  .entry-start:disabled { opacity: 0.4; cursor: not-allowed; }
  .entry-status { font-size: 0.85rem; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 2rem; }
  .entry-status.error { color: var(--danger); }

  .main-screen { justify-content: space-between; background: radial-gradient(ellipse at center 35%, rgba(20, 16, 28, 0.6) 0%, transparent 70%); }
  .main-header { text-align: center; }
  .main-user-name { font-size: 1.1rem; font-weight: 700; color: var(--pop-cream); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
  .main-code { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .main-code-num { color: var(--candle-yellow); letter-spacing: 0.15em; font-weight: 700; font-variant-numeric: tabular-nums; }
  .candle-stage { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; max-height: 55vh; }
  .candle-wrapper { position: relative; width: min(220px, 55vw); height: 55vh; max-height: 450px; }
  .candle-svg { width: 100%; height: 100%; overflow: visible; }
  .info-panel { text-align: center; margin-bottom: 1rem; }
  .time-remaining { font-size: 2.6rem; font-weight: 900; letter-spacing: 0.05em; color: var(--candle-yellow); text-shadow: 0 0 25px rgba(255, 216, 77, 0.5); font-variant-numeric: tabular-nums; transition: color 0.5s, text-shadow 0.5s; }
  .time-label { font-size: 0.7rem; letter-spacing: 0.4em; color: var(--text-muted); margin-top: 0.3rem; padding-left: 0.4em; }
  body.warning .time-remaining { color: var(--danger); text-shadow: 0 0 25px rgba(255, 94, 108, 0.5); }
  .main-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }

  .primary-btn { background: var(--candle-yellow); border: none; color: #4a3818; padding: 0.9rem 2.2rem; font-family: inherit; font-size: 0.95rem; font-weight: 900; letter-spacing: 0.15em; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 var(--candle-deep), 0 6px 15px rgba(255, 154, 60, 0.25); transition: all 0.15s ease; }
  .primary-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 0 var(--candle-deep), 0 10px 20px rgba(255, 154, 60, 0.35); }
  .primary-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 var(--candle-deep); }
  .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ghost-mode .primary-btn { background: var(--ghost-mist); color: #1a2238; box-shadow: 0 4px 0 #6a85b0, 0 6px 15px rgba(168, 197, 232, 0.3); }
  .ghost-mode .primary-btn:active:not(:disabled) { box-shadow: 0 2px 0 #6a85b0; }

  .pairing-screen { gap: 1.5rem; }
  .pairing-title { font-size: 1.6rem; font-weight: 900; color: var(--candle-yellow); margin-bottom: 0.5rem; text-shadow: 0 3px 0 var(--candle-deep); letter-spacing: 0.05em; }
  .pairing-card { background: rgba(255, 244, 214, 0.06); border: 2px solid rgba(255, 216, 77, 0.25); border-radius: 24px; padding: 1.8rem; width: min(360px, 90vw); text-align: center; }
  .pairing-card-label { font-size: 0.8rem; letter-spacing: 0.2em; color: var(--text-soft); font-weight: 700; margin-bottom: 1rem; }
  .big-code { font-size: 3rem; font-weight: 900; letter-spacing: 0.2em; color: var(--candle-yellow); font-variant-numeric: tabular-nums; text-shadow: 0 4px 0 var(--candle-deep), 0 0 25px rgba(255, 216, 77, 0.4); padding-left: 0.2em; }
  .pairing-input-field { background: transparent; border: none; border-bottom: 2px solid var(--text-muted); color: var(--candle-yellow); font-family: inherit; font-size: 2rem; font-weight: 900; letter-spacing: 0.3em; padding: 0.4rem; width: 100%; text-align: center; font-variant-numeric: tabular-nums; outline: none; transition: border-color 0.3s; }
  .pairing-input-field:focus { border-color: var(--candle-yellow); }
  .pairing-divider { font-size: 0.75rem; letter-spacing: 0.3em; color: var(--pop-mint); margin: 0.3rem 0; font-weight: 700; padding-left: 0.3em; }
  .pairing-divider::before, .pairing-divider::after { content: '✦'; margin: 0 0.5em; color: var(--pop-pink); }
  .back-link { background: transparent; border: none; color: var(--text-muted); font-family: inherit; font-size: 0.85rem; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
  .back-link:hover { color: var(--text-soft); }
  .pairing-status { font-size: 0.85rem; color: var(--candle-yellow); min-height: 1.5em; font-weight: 500; }
  .pairing-status.error { color: var(--danger); }

  .conv-label { background: var(--pop-pink); color: #4a1818; font-size: 0.75rem; letter-spacing: 0.3em; font-weight: 900; padding: 0.4rem 1.2rem 0.4rem 1.5rem; border-radius: 50px; margin-bottom: 1.5rem; }
  .conv-partner { font-size: 0.9rem; color: var(--text-soft); margin-bottom: 1.2rem; font-weight: 500; }
  .conv-partner .name { color: var(--candle-yellow); font-weight: 700; }
  .conv-topic { font-size: 1.7rem; font-weight: 700; line-height: 1.7; color: var(--pop-cream); text-align: center; max-width: 600px; margin-bottom: 2.5rem; padding: 0 1rem; }
  .conv-instruction { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 500; }
  .conv-waiting { font-size: 0.9rem; color: var(--candle-yellow); margin-top: 1.5rem; font-weight: 700; }
  .conv-waiting::after { content: '…'; animation: dotpulse 1.5s infinite; }
  @keyframes dotpulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }

  .success-screen { gap: 1.5rem; }
  .success-glyph { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, var(--candle-yellow) 0%, var(--candle-orange) 50%, transparent 80%); animation: glyph-glow 1.5s ease-in-out infinite; box-shadow: 0 0 40px rgba(255, 216, 77, 0.5); }
  @keyframes glyph-glow { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.9; } 50% { transform: scale(1.15) rotate(180deg); opacity: 1; } }
  .success-text { font-size: 1.8rem; font-weight: 900; color: var(--candle-yellow); text-shadow: 0 3px 0 var(--candle-deep); letter-spacing: 0.05em; }
  .success-detail { font-size: 0.95rem; color: var(--pop-cream); font-weight: 500; }

  .ghost-screen { gap: 1.2rem; }
  .ghost-title { font-size: 2.5rem; font-weight: 900; color: var(--ghost-mist); text-shadow: 0 3px 0 #6a85b0; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
  .ghost-subtitle { font-size: 0.95rem; color: var(--ghost-blue); text-align: center; line-height: 1.8; margin-bottom: 1rem; font-weight: 500; }
  .ghost-wisp { width: 180px; height: 180px; margin: 0.5rem 0; }
  .ghost-wisp svg { width: 100%; height: 100%; overflow: visible; }
  .ghost-progress { font-size: 1.1rem; color: var(--ghost-mist); margin-bottom: 1rem; font-weight: 700; letter-spacing: 0.05em; }
  .ghost-progress .count { color: var(--candle-yellow); font-size: 1.7rem; }
  @keyframes ghost-drift { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(3px, -5px) scale(1.03); } 66% { transform: translate(-3px, -2px) scale(0.97); } }
  .ghost-wisp-anim { animation: ghost-drift 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }

  @keyframes flicker { 0%, 100% { transform: scale(1, 1) translateX(0); } 25% { transform: scale(0.96, 1.05) translateX(-1px); } 50% { transform: scale(1.03, 0.97) translateX(1px); } 75% { transform: scale(0.98, 1.02) translateX(-0.5px); } }
  @keyframes glow-pulse { 0%, 100% { opacity: 0.65; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
  @keyframes blow-out { 0% { transform: skewX(0deg) scale(1, 1); opacity: 1; } 25% { transform: skewX(-28deg) scale(0.7, 1.1); opacity: 1; } 50% { transform: skewX(15deg) scale(0.45, 0.8); opacity: 0.8; } 100% { transform: skewX(0deg) scale(0, 0); opacity: 0; } }
  @keyframes glow-out { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.2); } }
  @keyframes smoke-drift { 0% { transform: translate(0, 0) scale(0.4); opacity: 0; } 10% { opacity: 0.7; } 50% { opacity: 0.5; } 100% { transform: translate(16px, -110px) scale(3.2); opacity: 0; } }
  @keyframes flame-bloom { 0% { transform: scale(1); } 50% { transform: scale(1.4); filter: brightness(1.5); } 100% { transform: scale(1); } }
  .flame-group { animation: flicker 0.18s infinite; transform-box: fill-box; transform-origin: 50% 100%; }
  .flame-glow-anim { animation: glow-pulse 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .flame-group.blowing-out { animation: blow-out 0.4s cubic-bezier(0.4, 0, 0.6, 1) forwards; }
  .flame-glow-anim.blowing-out { animation: glow-out 0.35s ease-out forwards; }
  .flame-group.blooming { animation: flame-bloom 0.8s ease-out, flicker 0.18s infinite; transform-origin: 50% 100%; }
  .smoke-wisp { transform-box: fill-box; transform-origin: center; animation: smoke-drift 2.6s ease-out forwards; pointer-events: none; }

  .death-overlay { position: fixed; inset: 0; background: rgba(15, 12, 25, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 2s ease; gap: 1.5rem; }
  .death-overlay.show { opacity: 1; pointer-events: all; }
  .death-text { font-size: 2.5rem; font-weight: 900; color: var(--text-soft); letter-spacing: 0.1em; }
  .death-subtext { font-size: 0.9rem; letter-spacing: 0.3em; color: var(--pop-mint); font-weight: 700; padding-left: 0.3em; }

  .conn-indicator { position: fixed; top: 0.6rem; right: 0.6rem; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-muted); z-index: 60; padding: 0.35rem 0.7rem; border: 1.5px solid var(--text-muted); border-radius: 50px; background: rgba(20, 16, 28, 0.5); font-weight: 700; }
  .conn-indicator.online { color: var(--pop-mint); border-color: var(--pop-mint); }
  .conn-indicator.offline { color: var(--danger); border-color: var(--danger); }

  /* ===== 名前検索 ===== */
  .name-search-field {
    background: rgba(255, 244, 214, 0.08);
    border: 2px solid var(--text-dim);
    border-radius: 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 1.15rem;
    font-weight: 500;
    padding: 0.8rem 1rem;
    width: 100%;
    text-align: center;
    outline: none;
    transition: all 0.3s;
  }
  .name-search-field:focus { border-color: var(--candle-yellow); background: rgba(255, 216, 77, 0.08); }
  .name-search-field::placeholder { color: var(--text-dim); }

  .search-results {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 280px;
    overflow-y: auto;
  }
  .search-result-item {
    background: rgba(255, 216, 77, 0.08);
    border: 2px solid rgba(255, 216, 77, 0.3);
    border-radius: 16px;
    padding: 0.9rem 1.2rem;
    color: var(--candle-yellow);
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }
  .search-result-item:hover {
    background: rgba(255, 216, 77, 0.18);
    transform: translateY(-1px);
  }
  .search-result-item:active { transform: translateY(1px); }
  .search-empty {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
    padding: 0.8rem;
    font-weight: 500;
  }

  /* ===== 名前変更リンク ===== */
  .name-edit-link {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    font-weight: 500;
    padding: 0.2rem 0.4rem;
    transition: color 0.2s;
  }
  .name-edit-link:hover { color: var(--candle-yellow); }
  .name-edit-link::before { content: '✎ '; opacity: 0.7; }

  /* ===== 名前変更モーダル ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15, 12, 25, 0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 70;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    padding: 1.5rem;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-card {
    background: var(--night-mid);
    border: 2px solid rgba(255, 216, 77, 0.25);
    border-radius: 24px;
    padding: 2rem 1.5rem;
    width: min(360px, 90vw);
    text-align: center;
  }
  .modal-title {
    font-size: 1.3rem; font-weight: 900;
    color: var(--candle-yellow);
    margin-bottom: 1.2rem;
    text-shadow: 0 3px 0 var(--candle-deep);
  }
  .modal-actions {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-top: 1rem;
  }
  .modal-cancel {
    background: transparent;
    border: 2px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.9rem 1.5rem;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-cancel:hover { color: var(--text-soft); border-color: var(--text-soft); }

  @media (max-width: 480px) {
    .entry-title { font-size: 2.3rem; }
    .conv-topic { font-size: 1.3rem; }
    .ghost-title { font-size: 2rem; }
    .big-code { font-size: 2.3rem; }
    .pairing-title { font-size: 1.3rem; }
  }
</style>
</head>
<body>
  <div class="stars" id="starField"></div>
  <div class="conn-indicator" id="connIndicator">接 続 中</div>

  <div class="screen" data-screen="entry">
    <div class="entry-mark">LET'S THINKING!</div>
    <h1 class="entry-title">いのちのロウソク</h1>
    <p class="entry-tagline">他人の灯で、自分が燃える夜</p>
    <input class="entry-name" id="nameInput" placeholder="あなたの名前は？" maxlength="12">
    <button class="entry-start" id="startBtn" disabled>蝋燭に火を灯す</button>
    <div class="entry-status" id="entryStatus"></div>
  </div>

  <div class="screen hidden main-screen" data-screen="main">
    <div class="main-header">
      <div class="main-user-name" id="mainName">─</div>
      <button class="name-edit-link" id="editNameBtn">名前を変える</button>
    </div>
    <div class="candle-stage">
      <div class="candle-wrapper">
        <svg class="candle-svg" viewBox="0 0 220 500" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffd84d" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#ff7029" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="waxGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#a08660"/>
              <stop offset="22%" stop-color="#fff4d6"/>
              <stop offset="78%" stop-color="#f0e2b8"/>
              <stop offset="100%" stop-color="#a08660"/>
            </linearGradient>
            <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
              <stop offset="0%" stop-color="#ff7029"/>
              <stop offset="55%" stop-color="#ffd84d"/>
              <stop offset="100%" stop-color="#fff5d1"/>
            </linearGradient>
            <filter id="smokeBlur" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5"/>
            </filter>
          </defs>
          <g id="topGroup">
            <circle class="flame-glow-anim" cx="110" cy="80" r="70" fill="url(#flameGlow)"/>
            <g class="flame-group" id="flame">
              <path d="M 110 115 Q 92 92, 98 60 Q 104 38, 110 26 Q 116 38, 122 60 Q 128 92, 110 115 Z" fill="url(#flameGrad)"/>
              <path d="M 110 110 Q 100 92, 104 70 Q 108 55, 110 48 Q 112 55, 116 70 Q 120 92, 110 110 Z" fill="#fff5d1" opacity="0.75"/>
            </g>
            <line x1="110" y1="108" x2="110" y2="125" stroke="#3a2a1a" stroke-width="2.5"/>
          </g>
          <rect id="wax" x="80" y="125" width="60" height="345" rx="6" fill="url(#waxGradient)" stroke="#8a7050" stroke-width="0.5"/>
          <ellipse id="waxTop" cx="110" cy="125" rx="30" ry="4" fill="#f0e2b8"/>
          <rect x="70" y="470" width="80" height="10" rx="3" fill="#3a2a1a"/>
          <rect x="65" y="478" width="90" height="8" rx="3" fill="#2a1a0a"/>
          <ellipse cx="110" cy="486" rx="50" ry="3" fill="rgba(0,0,0,0.5)"/>
        </svg>
      </div>
    </div>
    <div class="info-panel">
      <div class="time-remaining" id="timeDisplay">--:--</div>
      <div class="time-label">のこり</div>
    </div>
    <div class="main-actions">
      <button class="primary-btn" id="shareBtn">火を分かつ</button>
    </div>
  </div>

  <div class="screen hidden pairing-screen" data-screen="pairing">
    <h2 class="pairing-title">火を分かつ</h2>
    <div class="pairing-card" style="width: min(420px, 92vw);">
      <div class="pairing-card-label">相手の名前を入力<br><span style="font-size:0.7em; opacity:0.7;">（相手に火を分け与える）</span></div>
      <input class="name-search-field" id="partnerNameInput" type="text" maxlength="12" placeholder="名前を入力…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="pairing-status" id="pairingStatus"></div>
    <button class="back-link" id="backFromPairing">もどる</button>
  </div>

  <div class="screen hidden" data-screen="conversation">
    <div class="conv-label">お　題</div>
    <div class="conv-partner"><span id="convPartnerName" class="name">─</span> と話そう</div>
    <div class="conv-topic" id="convTopic">─</div>
    <div class="conv-instruction">話し終わったら、ふたりで完了をタップ</div>
    <button class="primary-btn" id="completeConvBtn">話し終わった！</button>
    <div class="conv-waiting hidden" id="convWaiting">相手の完了を待っています</div>
  </div>

  <div class="screen hidden success-screen" data-screen="success">
    <div class="success-glyph"></div>
    <div class="success-text">灯、分かたる</div>
    <div class="success-detail" id="successDetail">+30秒　ふたりの蝋燭が伸びた</div>
  </div>

  <div class="screen hidden ghost-screen" data-screen="ghost">
    <div class="ghost-wisp">
      <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
        <defs>
          <radialGradient id="ghostGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d4e4f5" stop-opacity="0.8"/>
            <stop offset="60%" stop-color="#a8c5e8" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#a8c5e8" stop-opacity="0"/>
          </radialGradient>
          <filter id="ghostBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3"/>
          </filter>
        </defs>
        <g class="ghost-wisp-anim">
          <circle cx="100" cy="100" r="80" fill="url(#ghostGrad)"/>
          <path d="M 100 50 Q 80 70, 85 100 Q 78 130, 95 145 Q 100 155, 105 145 Q 122 130, 115 100 Q 120 70, 100 50 Z" fill="#d4e4f5" opacity="0.6" filter="url(#ghostBlur)"/>
          <circle cx="88" cy="95" r="3" fill="#1a2238"/>
          <circle cx="112" cy="95" r="3" fill="#1a2238"/>
          <ellipse cx="100" cy="108" rx="3" ry="2" fill="#1a2238" opacity="0.6"/>
        </g>
      </svg>
    </div>
    <h2 class="ghost-title">ゆうれい</h2>
    <p class="ghost-subtitle">あなたの灯は消えた<br>他人の火を継ぐことで、再び命をもらえる</p>
    <div class="ghost-progress">
      <span class="count" id="ghostHelpedCount">0</span> ／ <span id="ghostRequired">3</span> 人の火を継いだ
    </div>
    <button class="primary-btn" id="ghostHelpBtn">人の蝋燭をのばす</button>
  </div>

  <div class="death-overlay" id="deathOverlay">
    <div class="death-text">灯、消ゆ</div>
    <div class="death-subtext">アジャラカモクレン</div>
    <button class="primary-btn" id="ghostBtn">ゆうれいになる</button>
  </div>

  <!-- 名前変更モーダル -->
  <div class="modal-overlay" id="nameEditModal">
    <div class="modal-card">
      <div class="modal-title">名前を変える</div>
      <input class="entry-name" id="editNameInput" placeholder="新しい名前" maxlength="12">
      <div class="modal-actions">
        <button class="modal-cancel" id="cancelEditName">やめる</button>
        <button class="primary-btn" id="saveNameBtn" disabled>変える</button>
      </div>
    </div>
  </div>

<script type="module">
  const starField = document.getElementById('starField');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    const t = Math.random();
    s.className = t > 0.85 ? 'star sparkle' : (t > 0.6 ? 'star big' : 'star');
    s.style.left = `${Math.random() * 100}%`;
    s.style.top = `${Math.random() * 100}%`;
    s.style.animationDelay = `${Math.random() * 3}s`;
    s.style.animationDuration = `${2 + Math.random() * 2}s`;
    starField.appendChild(s);
  }

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { getDatabase, ref, set, get, update, onValue, onDisconnect, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAxwEeCSh5CGlz8aMKbpROo77a2eTgS1Cc",
    authDomain: "shinking-night.firebaseapp.com",
    databaseURL: "https://shinking-night-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "shinking-night",
    storageBucket: "shinking-night.firebasestorage.app",
    messagingSenderId: "1046470684524",
    appId: "1:1046470684524:web:b07e305deab1645d7f8d49"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const CONFIG = { initialMinSeconds: 300, initialMaxSeconds: 480, flameTransferGain: 30, flameTransferGiverLoss: 15, ghostRequiredHelps: 3, ghostRebornSeconds: 120, waxMaxHeight: 345, waxYStart: 125 };

  const TOPICS = [
    "何歳まで生きたい？",
    "死ぬのは怖い？　なぜ？",
    "自分のお葬式はどんな雰囲気にしたい？",
    "死について考えることはある？",
    "死ぬまでにしたいことは？",
    "最後の晩餐、何を食べる？",
    "墓場まで持っていく話ってある？",
    "スマホ・PCのデータ、どうしたい？",
    "死の先には何があると思う？",
    "大切な人のためなら、命を捧げられる？",
    "生きるって、何だと思う？",
    "死ぬって、何だと思う？",
    "「死ね」という言葉について、どう感じる？",
    "お墓参りに行くと、気持ちは変わる？",
    "自分の先祖について、どのくらい知ってる？",
    "自分の墓に供えてほしい花は？",
    "延命措置はしてほしい？",
    "天国と地獄、自分はどちらに行くと思う？",
    "「生きててよかった」と思う瞬間は？",
    "法事などで供えてほしいものは？",
    "死者に会えるなら、誰に会いたい？",
    "最後に何かを伝えたい人はいる？",
    "もし生まれ変わるなら、何になりたい？",
  ];

  const state = {
    screen: 'entry', uid: null,
    user: { name: '', code: '', startedAt: 0, initialSeconds: 0, isGhost: false, ghostHelped: 0 },
    pairing: { pairingId: null, partnerUid: null, partnerName: '', topic: '', isInitiator: false, unsubscribe: null, convStartedAt: 0 },
    isDead: false,
  };

  const $ = id => document.getElementById(id);
  const $$ = sel => document.querySelectorAll(sel);
  const fmt = sec => { const s = Math.max(0, Math.floor(sec)); return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; };
  const showScreen = name => { state.screen = name; $$('.screen').forEach(el => el.classList.toggle('hidden', el.dataset.screen !== name)); };

  function calcSecondsLeft() {
    if (!state.user.startedAt) return 0;
    const effectiveNow = (state.screen === 'conversation' && state.pairing.convStartedAt > 0) ? state.pairing.convStartedAt : Date.now();
    return Math.max(0, state.user.initialSeconds - (effectiveNow - state.user.startedAt) / 1000);
  }

  const connIndicator = $('connIndicator');
  onValue(ref(db, '.info/connected'), snap => {
    if (snap.val() === true) { connIndicator.textContent = '繋'; connIndicator.className = 'conn-indicator online'; }
    else { connIndicator.textContent = '切'; connIndicator.className = 'conn-indicator offline'; }
  });

  const waxEl = $('wax'), waxTopEl = $('waxTop'), topGroup = $('topGroup');
  const flameEl = $('flame'), flameGlowEl = document.querySelector('.flame-glow-anim');

  function updateCandleDisplay() {
    const sec = calcSecondsLeft();
    const ratio = state.user.initialSeconds > 0 ? Math.max(0, Math.min(1, sec / state.user.initialSeconds)) : 0;
    const newHeight = CONFIG.waxMaxHeight * ratio;
    const newY = CONFIG.waxYStart + (CONFIG.waxMaxHeight - newHeight);
    waxEl.setAttribute('height', newHeight);
    waxEl.setAttribute('y', newY);
    waxTopEl.setAttribute('cy', newY);
    topGroup.setAttribute('transform', `translate(0, ${newY - CONFIG.waxYStart})`);
    $('timeDisplay').textContent = fmt(sec);
    document.body.classList.toggle('warning', ratio < 0.2 && !state.isDead);
    if (sec <= 0 && !state.isDead && !state.user.isGhost && state.user.initialSeconds > 0) die();
  }

  function spawnSmoke() {
    const sec = calcSecondsLeft();
    const ratio = state.user.initialSeconds > 0 ? sec / state.user.initialSeconds : 0;
    const dy = CONFIG.waxMaxHeight - CONFIG.waxMaxHeight * ratio;
    const baseY = 108 + dy;
    const SVG_NS = 'http://www.w3.org/2000/svg';
    for (let i = 0; i < 8; i++) {
      const wisp = document.createElementNS(SVG_NS, 'circle');
      wisp.setAttribute('cx', 110 + (Math.random()-0.5)*12);
      wisp.setAttribute('cy', baseY);
      wisp.setAttribute('r', 3.5 + Math.random()*2.5);
      wisp.setAttribute('fill', '#d0d0d0');
      wisp.setAttribute('filter', 'url(#smokeBlur)');
      wisp.setAttribute('class', 'smoke-wisp');
      wisp.style.animationDelay = `${i*0.07}s`;
      wisp.style.animationDuration = `${2.2 + Math.random()}s`;
      topGroup.appendChild(wisp);
      setTimeout(() => wisp.remove(), 4000);
    }
  }

  function die() {
    if (state.isDead) return;
    state.isDead = true;
    flameEl.classList.add('blowing-out');
    flameGlowEl.classList.add('blowing-out');
    spawnSmoke();
    setTimeout(() => $('deathOverlay').classList.add('show'), 2600);
  }

  async function startGame(name) {
    $('entryStatus').textContent = '蝋燭に火を灯しています…';
    $('entryStatus').classList.remove('error');
    try {
      if (!state.uid) { const cred = await signInAnonymously(auth); state.uid = cred.user.uid; }
      const initialSec = Math.floor(CONFIG.initialMinSeconds + Math.random() * (CONFIG.initialMaxSeconds - CONFIG.initialMinSeconds));
      const startedAt = Date.now();
      await set(ref(db, `users/${state.uid}`), { name, startedAt, initialSeconds: initialSec, isGhost: false, ghostHelped: 0 });
      // 切断時にユーザーデータを消す（イベント参加者一覧から外れる）
      onDisconnect(ref(db, `users/${state.uid}`)).remove();
      state.user = { name, startedAt, initialSeconds: initialSec, isGhost: false, ghostHelped: 0 };
      state.isDead = false;
      flameEl.classList.remove('blowing-out');
      flameGlowEl.classList.remove('blowing-out');
      topGroup.querySelectorAll('.smoke-wisp').forEach(el => el.remove());
      $('deathOverlay').classList.remove('show');
      document.body.classList.remove('ghost-mode');
      $('mainName').textContent = name;
      updateCandleDisplay();
      showScreen('main');
      onValue(ref(db, `users/${state.uid}`), snap => {
        const d = snap.val(); if (!d) return;
        state.user.startedAt = d.startedAt;
        state.user.initialSeconds = d.initialSeconds;
        state.user.isGhost = d.isGhost;
        state.user.ghostHelped = d.ghostHelped || 0;
        if (d.name) state.user.name = d.name;
        updateCandleDisplay();
      });
    } catch (e) {
      console.error(e);
      $('entryStatus').textContent = '接続できません。電波を確認してください。';
      $('entryStatus').classList.add('error');
    }
  }

  async function openPairing() {
    $('partnerNameInput').value = '';
    $('searchResults').innerHTML = '';
    $('pairingStatus').textContent = '';
    $('pairingStatus').classList.remove('error');
    showScreen('pairing');
    setTimeout(() => $('partnerNameInput').focus(), 300);
  }

  // 名前で検索（部分一致、大小文字無視）
  async function searchUsersByName(query) {
    const q = query.trim().toLowerCase();
    if (!q) { $('searchResults').innerHTML = ''; return; }
    try {
      const snap = await get(ref(db, 'users'));
      if (!snap.exists()) { $('searchResults').innerHTML = '<div class="search-empty">参加者が見つかりません</div>'; return; }
      const allUsers = snap.val();
      const matches = [];
      Object.entries(allUsers).forEach(([uid, u]) => {
        if (uid === state.uid) return; // 自分は除外
        if (!u.name) return;
        if (u.name.toLowerCase().includes(q)) {
          matches.push({ uid, name: u.name, isGhost: u.isGhost });
        }
      });
      renderSearchResults(matches);
    } catch (e) {
      console.error(e);
      $('searchResults').innerHTML = '<div class="search-empty">検索エラー</div>';
    }
  }

  function renderSearchResults(matches) {
    const container = $('searchResults');
    if (matches.length === 0) {
      container.innerHTML = '<div class="search-empty">該当する人が見つかりません</div>';
      return;
    }
    container.innerHTML = '';
    matches.slice(0, 10).forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'search-result-item';
      btn.textContent = m.isGhost ? `${m.name}（ゆうれい）` : m.name;
      btn.addEventListener('click', () => startPairingWithUid(m.uid, m.name));
      container.appendChild(btn);
    });
  }

  async function startPairingWithUid(partnerUid, partnerName) {
    $('pairingStatus').textContent = `${partnerName} につないでいます…`;
    $('pairingStatus').classList.remove('error');
    try {
      const partnerSnap = await get(ref(db, `users/${partnerUid}`));
      if (!partnerSnap.exists()) { $('pairingStatus').textContent = '相手の蝋燭が見つかりません'; $('pairingStatus').classList.add('error'); return; }
      const partnerData = partnerSnap.val();
      const [uidA, uidB] = [state.uid, partnerUid].sort();
      const pairingId = `${uidA}_${uidB}`;
      const topic = TOPICS[Math.floor(Math.random() * TOPICS.length)];
      const existing = await get(ref(db, `pairings/${pairingId}`));
      if (existing.exists() && !existing.val().completed) {
        // 既存に参加：相手があげる側、自分がもらう側
        state.pairing = { pairingId, partnerUid, partnerName: partnerData.name, topic: existing.val().topic, isInitiator: false, giverUid: existing.val().giverUid, receiverUid: existing.val().receiverUid, unsubscribe: null, convStartedAt: 0 };
      } else {
        // 新規作成：自分があげる側
        const giverUid = state.uid;
        const receiverUid = partnerUid;
        await set(ref(db, `pairings/${pairingId}`), {
          uidA, uidB, topic,
          nameA: state.uid === uidA ? state.user.name : partnerData.name,
          nameB: state.uid === uidB ? state.user.name : partnerData.name,
          giverUid, receiverUid,
          approvedA: false, approvedB: false, completed: false, createdAt: serverTimestamp(),
        });
        state.pairing = { pairingId, partnerUid, partnerName: partnerData.name, topic, isInitiator: true, giverUid, receiverUid, unsubscribe: null, convStartedAt: 0 };
      }
      enterConversation();
    } catch (e) {
      console.error(e);
      $('pairingStatus').textContent = '接続エラー';
      $('pairingStatus').classList.add('error');
    }
  }

  function enterConversation() {
    $('convPartnerName').textContent = state.pairing.partnerName;
    $('convTopic').textContent = state.pairing.topic;
    $('completeConvBtn').classList.remove('hidden');
    $('convWaiting').classList.add('hidden');
    state.pairing.convStartedAt = Date.now();
    showScreen('conversation');
    const pairingRef = ref(db, `pairings/${state.pairing.pairingId}`);
    state.pairing.unsubscribe = onValue(pairingRef, async snap => {
      const d = snap.val(); if (!d) return;
      if (d.completed && state.screen === 'conversation') { await applyTransferGain(); finishTransferLocal(); }
    });
  }

  async function selfApproveConversation() {
    $('completeConvBtn').classList.add('hidden');
    $('convWaiting').classList.remove('hidden');
    const pairingId = state.pairing.pairingId;
    const [uidA, uidB] = pairingId.split('_');
    const field = state.uid === uidA ? 'approvedA' : 'approvedB';
    await update(ref(db, `pairings/${pairingId}`), { [field]: true });
    const snap = await get(ref(db, `pairings/${pairingId}`));
    const d = snap.val();
    if (d.approvedA && d.approvedB && !d.completed) {
      await update(ref(db, `pairings/${pairingId}`), { completed: true });
    }
  }

  async function applyTransferGain() {
    const pairingId = state.pairing.pairingId;
    const flag = `gainApplied_${state.uid}`;
    const snap = await get(ref(db, `pairings/${pairingId}/${flag}`));
    if (snap.exists()) return;
    await update(ref(db, `pairings/${pairingId}`), { [flag]: true });

    const convDurationSec = state.pairing.convStartedAt > 0 ? (Date.now() - state.pairing.convStartedAt) / 1000 : 0;
    const userSnap = await get(ref(db, `users/${state.uid}`));
    const u = userSnap.val(); if (!u) return;

    // 自分が「あげる側」か「もらう側」かで処理を分ける
    const isGiver = state.pairing.giverUid === state.uid;
    // もらう側：+30秒、あげる側：-15秒（もらった秒数の半分）
    const flameChange = isGiver ? -CONFIG.flameTransferGiverLoss : CONFIG.flameTransferGain;
    // startedAtの調整：会話時間ぶん未来へ＋火の変化を反映（プラスなら過去へ、マイナスなら未来へ）
    const adjustMs = (convDurationSec - flameChange) * 1000;
    await update(ref(db, `users/${state.uid}`), { startedAt: u.startedAt + adjustMs });
  }

  function finishTransferLocal() {
    if (state.pairing.unsubscribe) { state.pairing.unsubscribe(); state.pairing.unsubscribe = null; }
    const isGiver = state.pairing.giverUid === state.uid;
    if (isGiver) {
      flameEl.classList.add('blowing-out'); // 軽くしぼむ演出はしないので blooming は出さない
      setTimeout(() => flameEl.classList.remove('blowing-out'), 100); // すぐ戻す（アニメは使わない）
      $('successDetail').textContent = `−${CONFIG.flameTransferGiverLoss}秒　あなたの蝋燭が分かたれた`;
    } else {
      flameEl.classList.add('blooming');
      setTimeout(() => flameEl.classList.remove('blooming'), 800);
      $('successDetail').textContent = `+${CONFIG.flameTransferGain}秒　あなたの蝋燭が伸びた`;
    }
    showScreen('success');
    setTimeout(() => {
      const initiator = state.pairing.isInitiator;
      const pairingId = state.pairing.pairingId;
      state.pairing = { pairingId: null, partnerUid: null, partnerName: '', topic: '', isInitiator: false, giverUid: null, receiverUid: null, unsubscribe: null, convStartedAt: 0 };
      if (initiator) setTimeout(() => remove(ref(db, `pairings/${pairingId}`)).catch(()=>{}), 5000);
      showScreen('main');
    }, 1800);
  }

  async function enterGhost() {
    state.user.isGhost = true;
    document.body.classList.add('ghost-mode');
    $('deathOverlay').classList.remove('show');
    $('ghostHelpedCount').textContent = '0';
    await update(ref(db, `users/${state.uid}`), { isGhost: true, ghostHelped: 0 });
    showScreen('ghost');
  }

  async function ghostHelp() { await openPairing(); }

  setInterval(() => { if (state.screen === 'main') updateCandleDisplay(); }, 200);

  $('nameInput').addEventListener('input', e => { $('startBtn').disabled = e.target.value.trim().length === 0; });
  $('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !$('startBtn').disabled) $('startBtn').click(); });
  $('startBtn').addEventListener('click', () => { const name = $('nameInput').value.trim(); if (name) startGame(name); });
  $('shareBtn').addEventListener('click', () => openPairing());

  // 名前検索（インクリメンタル、150ms debounce）
  let searchDebounceTimer = null;
  $('partnerNameInput').addEventListener('input', e => {
    clearTimeout(searchDebounceTimer);
    const q = e.target.value;
    searchDebounceTimer = setTimeout(() => searchUsersByName(q), 150);
  });

  $('backFromPairing').addEventListener('click', () => showScreen('main'));
  $('completeConvBtn').addEventListener('click', selfApproveConversation);
  $('ghostBtn').addEventListener('click', enterGhost);
  $('ghostHelpBtn').addEventListener('click', ghostHelp);

  // 名前変更モーダル
  $('editNameBtn').addEventListener('click', () => {
    $('editNameInput').value = state.user.name;
    $('saveNameBtn').disabled = false;
    $('nameEditModal').classList.add('show');
    setTimeout(() => $('editNameInput').focus(), 150);
  });
  $('editNameInput').addEventListener('input', e => {
    const v = e.target.value.trim();
    $('saveNameBtn').disabled = v.length === 0 || v === state.user.name;
  });
  $('editNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !$('saveNameBtn').disabled) $('saveNameBtn').click();
  });
  $('cancelEditName').addEventListener('click', () => $('nameEditModal').classList.remove('show'));
  $('saveNameBtn').addEventListener('click', async () => {
    const newName = $('editNameInput').value.trim();
    if (!newName) return;
    try {
      await update(ref(db, `users/${state.uid}`), { name: newName });
      state.user.name = newName;
      $('mainName').textContent = newName;
      $('nameEditModal').classList.remove('show');
    } catch (e) {
      console.error(e);
    }
  });

  showScreen('entry');
</script>
</body>
</html>
